trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  nodeVersion: '20.x'

stages:

# ==========================
# Build Stage
# ==========================
- stage: Build
  displayName: 'Build Stage'

  jobs:
  - job: BuildJob
    displayName: 'Build Application'

    steps:

    # Install .NET 8
    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.x'

    # Restore
    - task: DotNetCoreCLI@2
      displayName: 'Restore Packages'
      inputs:
        command: 'restore'
        projects: 'server/*.sln'

    # Build
    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: 'server/*.sln'
        arguments: '--configuration $(buildConfiguration)'

    # Publish API
    - task: DotNetCoreCLI@2
      displayName: 'Publish API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'server/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'

    # Install Node
    - task: UseNode@1
      displayName: 'Install Node.js'
      inputs:
        version: '20.x'

    # Install Angular Packages
    - script: |
        cd client
        npm install
      displayName: 'Install npm packages'

    # Build Angular
    - script: |
        cd client
        npm run build
      displayName: 'Build Angular'

    # Publish Artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifact'
      inputs:
        PathtoPublish: 'client/dist'
        ArtifactName: 'clientArtifact'
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'serverArtifact'


# ==========================
# Deploy Dev
# ==========================
- stage: Deploy_Dev
  displayName: 'Deploy to Development'
  dependsOn: Build

  jobs:
  - job: DevJob
    steps:
    - script: echo "Deploying to Development..."
      displayName: 'Dummy Dev Deployment'


# ==========================
# Deploy QA
# ==========================
- stage: Deploy_QA
  displayName: 'Deploy to QA'
  dependsOn: Deploy_Dev

  jobs:
  - job: QAJob
    steps:
    - script: echo "Deploying to QA..."
      displayName: 'Dummy QA Deployment'


# ==========================
# Deploy Production
# ==========================
- stage: Deploy_Production
  displayName: 'Deploy to Production'
  dependsOn: Deploy_QA

  jobs:
  - job: ProductionJob
    steps:
    - script: echo "Deploying to Production..."
      displayName: 'Dummy Production Deployment'